name: CLA Assistant

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers/permissions preserved verbatim from the prior local file.
# Reusable workflow defaults (owner_login=ywatanabe1989,
# owner_allowlist="bot*,ywatanabe1989", default_branch=main) do NOT match
# this repo's prior hardcoded allowlist (adds LLEmacs), so `owner_allowlist`
# is overridden below.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
  push:
    branches: [main, develop]
    tags: ['v*']

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  call:
    uses: scitex-ai/.github/.github/workflows/cla.yml@main
    with:
      owner_allowlist: "bot*,ywatanabe1989,LLEmacs"
    secrets: inherit
