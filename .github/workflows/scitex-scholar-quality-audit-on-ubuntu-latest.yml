name: quality

# Single-package quality gate — runs the same audit-all sweep that
# `tests/develop/test_audit.py::test_audit_all_for_scitex_scholar_runs_without_error`
# runs inside the test suite, via that test itself. Running through the
# test gives us the carefully-curated `skip_rules` allow-list (PA-305 +
# §1d / §2 / §4 / §6 — each documented in test_audit.py with its
# remediation backlog), so this standalone gate fails only on NEW
# violations, not on the long-known deferred set the package has not
# finished cleaning up yet.
#
# Running the bare `scitex-dev ecosystem audit-all` without those
# skip_rules is the same as running the test suite without test_audit.py
# but with zero discrimination between "regression" and "long-known".
# We had that for one cron cycle; it tripped on every run because the
# package isn't fully clean yet, drowning real regressions in the noise.
#
# The previous body of this workflow shallow-cloned the entire ecosystem
# and ran `scripts/quality/audit_ecosystem.py` — both of which live only
# in scitex-dev, not in leaf packages. That template was copied here
# verbatim and was always broken (FileNotFoundError on a non-existent
# ecosystem registry file). PR #39 replaced it with a bare audit-all
# invocation; this iteration routes through the pytest test so the gate
# matches the in-tree allow-list.

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC, after the 07:00 per-repo Test runs
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scitex-scholar-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "scitex-dev[cli-audit]"

      - name: Run scitex-dev ecosystem audit-all (via tests/develop/test_audit.py)
        # The test calls `audit_all_for_package(..., skip_rules=...)` which
        # masks the curated allow-list (PA-305 / §1d / §2 / §4 / §6) and
        # raises AssertionError on anything NEW. UserWarning is emitted
        # for masked violations — surfaced via pytest's normal warning
        # capture so reviewers see exactly what's deferred.
        run: pytest tests/develop/test_audit.py -q --no-cov -p no:cacheprovider
