name: quality

# PILOT: org-level reusable-workflow caller (scitex-ai/.github, 2026-07-10).
# Triggers preserved verbatim from the prior local file. Job body (audit
# via `scitex-dev ecosystem audit-all`) replaced by the org-level reusable
# workflow, which auto-derives the package name from this repo's own
# pyproject.toml/src layout — same effective command.

on:
  schedule:
    - cron: "0 18 * * *"  # 18:00 UTC (~03:00 JST), after Test
  workflow_dispatch:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/scitex-scholar-quality-audit-on-ubuntu-latest.yml"
  pull_request:
    branches: [main, develop]

jobs:
  quality-audit:
    # New required-status-check context: "quality-audit / audit"
    uses: scitex-ai/.github/.github/workflows/quality-audit.yml@main
    secrets: inherit
